services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wireguard_manager}
      POSTGRES_USER: ${POSTGRES_USER:-wireguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wireguard}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  wireguard-manager:
    build: .
    command: ["sh", "-c", "gunicorn --bind ${FLASK_HOST:-0.0.0.0}:${FLASK_PORT:-5000} --workers ${GUNICORN_WORKERS:-2} --threads ${GUNICORN_THREADS:-4} --timeout ${GUNICORN_TIMEOUT:-60} --graceful-timeout ${GUNICORN_GRACEFUL_TIMEOUT:-30} --keep-alive ${GUNICORN_KEEPALIVE:-5} 'app.api:create_app()'"]
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      SECRET_KEY: ${SECRET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-wireguard}:${POSTGRES_PASSWORD:-wireguard}@postgres:5432/${POSTGRES_DB:-wireguard_manager}}
      DB_SCHEMA: ${DB_SCHEMA:-wireguard_manager}

      # Opcional: sincroniza do MikroTik -> SQLite uma vez ao iniciar o container, trocar para 1 para ativar
      RUN_MIKROTIK_SYNC_ON_START: ${RUN_MIKROTIK_SYNC_ON_START:-0}
      MIKROTIK_HOST: ${MIKROTIK_HOST:-}
      MIKROTIK_USER: ${MIKROTIK_USER:-}
      MIKROTIK_PASS: ${MIKROTIK_PASS:-}
    restart: unless-stopped

volumes:
  pgdata:
