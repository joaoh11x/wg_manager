{% extends 'layouts/base.html' %}

{% block title %}Hardware | WG Manager{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
  <div>
    <h1 class="h4 mb-1">Monitor de hardware</h1>
    <div class="text-muted">Recursos do MikroTik (CPU e memória)</div>
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-outline-secondary btn-sm" type="button" id="btnTogglePoll">Pausar</button>
    <button class="btn btn-dark btn-sm" type="button" id="btnRefresh">Atualizar</button>
  </div>
</div>

<div class="row g-3">
  <div class="col-12 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-muted small">CPU</div>
        <div class="d-flex align-items-end justify-content-between">
          <div class="display-6" id="cpuLoad">—</div>
          <div class="text-muted" id="cpuMeta">—</div>
        </div>
        <div class="progress" role="progressbar" aria-label="CPU">
          <div class="progress-bar bg-dark" id="cpuBar" style="width: 0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Memória</div>
        <div class="d-flex align-items-end justify-content-between">
          <div class="display-6" id="memUsed">—</div>
          <div class="text-muted" id="memMeta">—</div>
        </div>
        <div class="progress" role="progressbar" aria-label="Memória">
          <div class="progress-bar bg-dark" id="memBar" style="width: 0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="text-muted small">Sistema</div>
        <div class="mt-2">
          <div class="d-flex justify-content-between"><span class="text-muted">Board</span><span id="board">—</span></div>
          <div class="d-flex justify-content-between"><span class="text-muted">Versão</span><span id="version">—</span></div>
          <div class="d-flex justify-content-between"><span class="text-muted">Uptime</span><span id="uptime">—</span></div>
          <div class="d-flex justify-content-between"><span class="text-muted">Arquitetura</span><span id="arch">—</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="text-muted small mt-3" id="lastUpdate">—</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/pages/hardware.js') }}"></script>
{% endblock %}
