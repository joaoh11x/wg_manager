<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}WG Manager{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">

  {% block head %}{% endblock %}
</head>
<body class="bg-body-tertiary">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-dark-subtle">
    <div class="container-fluid">
      <a class="navbar-brand" href="/ui/dashboard">WG Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/ui/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/ui/peers">Peers</a></li>
          <li class="nav-item"><a class="nav-link" href="/ui/groups">Grupos</a></li>
          <li class="nav-item"><a class="nav-link" href="/ui/interfaces">Interfaces</a></li>
          <li class="nav-item"><a class="nav-link" href="/ui/hardware">Hardware</a></li>
        </ul>

        <div class="d-flex align-items-center gap-2">
          <div class="text-white-50 small d-none d-lg-block" id="navUser"></div>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
