<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Minha VPN | WG Manager{% endblock %}</title>

  <link rel="icon" href="{{ url_for('static', filename='wireguard.ico') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">

  {% block head %}{% endblock %}
</head>
<body class="bg-body-tertiary">
  <header class="border-bottom bg-white">
    <div class="container py-3 d-flex align-items-center justify-content-between">
      <a class="text-decoration-none text-dark" href="/ui/me">
        <span class="fw-semibold">WG Manager</span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <div class="text-muted small" id="navUser"></div>
        <button class="btn btn-outline-dark btn-sm" id="btnLogout" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
