{% extends 'layouts/auth.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-5">
    <div class="text-center mb-4">
      <h1 class="h3 mb-1">WG Manager</h1>
      <div class="text-muted">Acesse para administrar WireGuard no MikroTik</div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label" for="username">Usuário</label>
            <input class="form-control" id="username" name="username" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Senha</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button class="btn btn-dark w-100" type="submit" id="btnLogin">Entrar</button>
        </form>
      </div>
    </div>

    <div class="text-center text-muted small mt-3">
      Dica: use um usuário com role <span class="fw-semibold">admin</span> para ver todas as páginas.
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='js/pages/login.js') }}"></script>
{% endblock %}
